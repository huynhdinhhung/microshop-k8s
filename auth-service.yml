apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: microshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: hung16/microshop-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: microshop-config
                  key: AUTH_PORT
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: microshop-secret
                  key: AUTH_MONGO_URI

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: microshop
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
