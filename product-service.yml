apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: microshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: hung16/microshop-product-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: microshop-config
                  key: PRODUCT_PORT
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: microshop-config
                  key: PRODUCT_MONGO_URI

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: microshop
spec:
  type: ClusterIP
  selector:
    app: product-service
  ports:
    - port: 3002
      targetPort: 3002
